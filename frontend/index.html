<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clinic Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header>
        <div>
          return message deleted
          <h1>Clinic Tracker</h1>
          <p class="muted">Simple clinic management dashboard</p>
        </div>
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
          <nav>
            <button class="nav-btn active" data-view="dashboard">Dashboard</button>
            <button class="nav-btn" data-view="logs">Daily Logs</button>
            <button class="nav-btn" data-view="inventory">Inventory</button>
            <button class="nav-btn" data-view="reports">Reports</button>
          </nav>
          <button id="theme-toggle" class="secondary">🌙 Dark mode</button>
        </div>
      </header>

      <div id="message" class="message info" hidden></div>

      <section id="dashboard-view" class="view active">
        <div class="grid grid-2" id="dashboard-stats"></div>
        <div class="grid grid-3" style="margin-top: 18px;">
          <article class="card">
            <h3>Top diseases</h3>
            <ul id="top-diseases" class="pill-list"></ul>
          </article>
          <article class="card">
            <h3>Critical stock</h3>
            <ul id="critical-stock" class="pill-list"></ul>
          </article>
          <article class="card">
            <h3>Monthly revenue trend</h3>
            <div id="monthly-trends" class="trend-chart"></div>
          </article>
        </div>
      </section>

      <section id="logs-view" class="view">
        <div class="grid grid-2">
          <article class="card">
            <h2>Add daily log</h2>
            <form id="daily-log-form">
              <label>Date <input name="date" type="date" required /></label>
              <label>Patients <input name="total_patients" type="number" min="0" required /></label>
              <label>Revenue <input name="total_revenue" type="number" min="0" step="0.01" required /></label>
              <label>Expenses <input name="total_expenses" type="number" min="0" step="0.01" required /></label>
              <label>Notes <textarea name="notes"></textarea></label>
              <label>Disease breakdown (one per line, format: Disease:count) <textarea name="diseases" placeholder="Malaria:12&#10;Flu:4"></textarea></label>
              <button class="primary" type="submit">Save log</button>
            </form>
          </article>
          <article class="card">
            <h2>Recent daily logs</h2>
            <div id="daily-log-list" class="grid"></div>
          </article>
        </div>
      </section>

      <section id="inventory-view" class="view">
        <div class="grid grid-2">
          <article class="card">
            <h2>Add inventory item</h2>
            <form id="inventory-form">
              <label>Drug name <input name="drug_name" required /></label>
              <label>Quantity in stock <input name="quantity_in_stock" type="number" min="0" required /></label>
              <label>Reorder level <input name="reorder_level" type="number" min="0" required /></label>
              <label>Unit cost <input name="unit_cost" type="number" min="0" step="0.01" required /></label>
              <label>Selling price <input name="selling_price" type="number" min="0" step="0.01" required /></label>
              <label>Expiry date <input name="expiry_date" type="date" /></label>
              <button class="primary" type="submit">Save item</button>
            </form>
          </article>
          <article class="card">
            <h2>Inventory</h2>
            <div id="inventory-list" class="grid"></div>
          </article>
        </div>
      </section>

      <section id="reports-view" class="view">
        <div id="report-summary" class="grid grid-2"></div>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
